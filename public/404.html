<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>kemist-dashboard</title>
    <script>
      // GitHub Pages SPA redirect
      //
      // When GitHub Pages gets a request for a path that doesn't correspond
      // to a real file (e.g. /kemist-dashboard/scans/2026-04-24/domains/…),
      // it serves this 404.html instead of a real 404.  We encode the full
      // path + query + hash into a single query-string param and redirect
      // back to the base index.html, where a companion script restores the
      // original URL before the SPA router initialises.
      //
      // pathSegmentsToKeep = 1 because this is a GitHub Pages *project* site
      // hosted at /kemist-dashboard/ (one segment to keep before the "?/").
      //
      // Technique from https://github.com/rafgraph/spa-github-pages (MIT).
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search
            ? "&" + l.search.slice(1).replace(/&/g, "~and~")
            : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
