<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kemist-dashboard</title>
    <script>
      // GitHub Pages SPA restore
      //
      // Companion to public/404.html.  If GitHub Pages redirected here via
      // the 404 trick, the original path was encoded into the query string
      // as "?/path…".  Reconstruct the real URL via history.replaceState
      // before the SPA router initialises so it sees the correct location.
      //
      // Technique from https://github.com/rafgraph/spa-github-pages (MIT).
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
