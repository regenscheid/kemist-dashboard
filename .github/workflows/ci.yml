name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# pnpm version is read from package.json's `packageManager` field
# by pnpm/action-setup@v4 — no need to duplicate it here.

jobs:
  lint-typecheck-test-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Reads .nvmrc at the repo root so CI and local shells stay
          # in lockstep. Bump Node by editing .nvmrc in a single PR.
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        # tsc -b --noEmit catches type regressions without producing
        # artifacts; also forces the TanStack Router plugin to
        # regenerate routeTree.gen.ts if it's stale.
        run: pnpm typecheck

      - name: Vitest
        run: pnpm test

      - name: Vite build
        # Offline build — does not pull S3 data. The deploy workflow
        # (PR 8) runs the fetch step plus this build step.
        run: pnpm build
